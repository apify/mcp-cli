name: E2E Windows

on:
  workflow_dispatch:
  workflow_call:

jobs:
  e2e-windows-node:
    name: E2E tests (Windows, Node.js)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: E2E tests
        run: ./test/e2e/run.sh --no-build --parallel 1

  e2e-windows-bun:
    name: E2E tests (Windows, Bun)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: E2E tests
        run: ./test/e2e/run.sh --no-build --runtime bun --parallel 1
